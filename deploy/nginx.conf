# LevelUp 英语修仙 - Nginx 部署配置
# 部署路径: /var/www/levelup

upstream levelup_backend {
    server 127.0.0.1:9000;
}

server {
    listen 80;
    server_name levelup.example.com;
    root /var/www/levelup/public;
    index index.php;

    # HTTPS 重定向（上线后启用）
    # return 301 https://$server_name$request_uri;

    charset utf-8;
    client_max_body_size 20M;

    # 静态资源缓存
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /storage/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # API 路由
    location /api/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP 处理
    location ~ \.php$ {
        fastcgi_pass levelup_backend;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_param APP_ENV production;
        fastcgi_param APP_DEBUG false;
    }

    # 禁止访问敏感文件
    location ~ /\.(git|env|env\.example) {
        deny all;
    }

    location ~ /vendor/ {
        deny all;
    }

    location ~ /storage/logs/ {
        deny all;
    }

    # 根路径
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;
    gzip_vary on;
}

